<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile viewport: lock scale, prevent user zoom during the experience -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <!-- iOS full-screen web-app feel -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>Between States</title>

    <!-- TEMP DEBUG: mobile console — remove before final release -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
      /* ── Reset ── */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      /* ── Hydra canvas fills the screen ── */
      #hydra-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      /* ── Tap-to-start overlay ── */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: rgba(0, 0, 0, 0.88);
        z-index: 100;
        cursor: pointer;
        /* manipulation: prevents double-tap zoom while keeping tap events intact */
        touch-action: manipulation;
        transition: opacity 0.6s ease;
      }

      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #overlay h1 {
        color: #fff;
        font-family: "Courier New", Courier, monospace;
        font-size: clamp(1.4rem, 6vw, 2.2rem);
        font-weight: 300;
        letter-spacing: 0.25em;
        text-transform: uppercase;
      }

      #overlay .hint {
        color: rgba(255, 255, 255, 0.45);
        font-family: "Courier New", Courier, monospace;
        font-size: clamp(0.7rem, 3vw, 0.9rem);
        letter-spacing: 0.2em;
        text-transform: lowercase;
      }

      #overlay .error {
        color: rgba(255, 80, 80, 0.85);
        font-family: "Courier New", Courier, monospace;
        font-size: 0.8rem;
        letter-spacing: 0.1em;
        display: none;
      }
    </style>
  </head>

  <body>
    <!-- Hydra renders into this canvas -->
    <canvas id="hydra-canvas"></canvas>

    <!-- Full-screen overlay — removed once the user grants mic access -->
    <div id="overlay">
      <h1>Between States</h1>
      <p class="hint">tap to begin</p>
      <p class="error" id="error-msg"></p>
    </div>

    <!-- ES module entry point -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
